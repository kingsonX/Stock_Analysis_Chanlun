<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>缠论分析工作台</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css', v=static_version) }}">
  </head>
  <body>
    <main class="shell">
      <section class="workspace">
        <header class="topbar">
          <div>
            <h1>缠论分析工作台</h1>
            <p id="statusText">输入股票名称或代码，生成分型、笔、中枢、背驰和买卖点。</p>
          </div>
          <div class="searchBox">
            <label for="stockInput">股票</label>
            <input id="stockInput" type="search" placeholder="平安银行 / 000001 / PAYH" autocomplete="off">
            <div id="suggestions" class="suggestions" hidden></div>
          </div>
        </header>

        <section class="controls" aria-label="分析参数">
          <div class="segmented" id="levelTabs">
            <button type="button" class="active" data-level="daily">日线</button>
            <button type="button" data-level="weekly">周线</button>
            <button type="button" data-level="monthly">月线</button>
          </div>
          <label>
            开始
            <input id="startDate" type="date">
          </label>
          <label>
            结束
            <input id="endDate" type="date">
          </label>
          <button id="refreshBtn" type="button">分析</button>
        </section>

        <section id="errorBox" class="errorBox" hidden></section>

        <section class="chartArea">
          <canvas id="chartCanvas" aria-label="缠论K线图"></canvas>
          <div id="tooltip" class="tooltip" hidden></div>
        </section>
      </section>

      <aside class="sidePanel">
        <section class="panel">
          <h2>信号摘要</h2>
          <div id="signalList" class="empty">暂无分析结果</div>
        </section>
        <section class="panel">
          <h2>结构统计</h2>
          <dl id="metaStats" class="stats"></dl>
        </section>
        <section class="panel">
          <h2>最近中枢</h2>
          <div id="centerList" class="tableWrap"></div>
        </section>
        <section class="panel">
          <h2>背驰候选</h2>
          <div id="divergenceList" class="tableWrap"></div>
        </section>
      </aside>
    </main>

    <script src="{{ url_for('static', filename='app.js', v=static_version) }}"></script>
  </body>
</html>
