services:
  - type: web
    name: stock-analysis-chanlun
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: TUSHARE_TOKEN
        sync: false
      - key: MX_APIKEY
        sync: false
      - key: CLAUDE_BASE_URL
        value: "https://code.newcli.com/claude"
      - key: CLAUDE_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: "Claude Sonnet 4.6"
      - key: CLAUDE_API_VERSION
        value: "2023-06-01"
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: FLASK_DEBUG
        value: "0"
