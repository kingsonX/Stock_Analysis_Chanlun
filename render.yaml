services:
  - type: web
    name: stock-analysis-chanlun
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT
    healthCheckPath: /
    autoDeployTrigger: commit
    envVars:
      - key: TUSHARE_TOKEN
        sync: false
      - key: MX_APIKEY
        sync: false
      - key: MYSQL_URL
        sync: false
      - key: MYSQL_POOL_MIN_SIZE
        value: "1"
      - key: MYSQL_POOL_MAX_SIZE
        value: "4"
      - key: DEEPSEEK_BASE_URL
        value: "https://api.deepseek.com"
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: "deepseek-v4-pro"
      - key: DEEPSEEK_MAX_TOKENS
        value: "1800"
      - key: DEEPSEEK_REASONING_EFFORT
        value: "high"
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: FLASK_DEBUG
        value: "0"
